{% extends "base.html" %}
{% block body %}
<div class="h-full overflow-y-auto">
<div class="max-w-3xl mx-auto p-6 space-y-8">

  <h1 class="text-xl font-semibold">记忆库</h1>

  <!-- 上传文件 -->
  <div class="bg-zinc-900 rounded-lg p-4 space-y-3">
    <h2 class="text-sm font-medium text-zinc-400">上传文档</h2>
    <form id="upload-form" class="flex gap-2">
      <input type="file" name="file" accept=".pdf,.docx,.xlsx,.md,.txt"
             class="flex-1 text-sm text-zinc-400 file:mr-3 file:bg-zinc-800 file:border-0 file:px-3 file:py-1 file:rounded file:text-zinc-200">
      <button class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm">上传</button>
    </form>
    <div id="upload-status" class="text-sm text-zinc-500"></div>
  </div>

  <!-- 抓网页 -->
  <div class="bg-zinc-900 rounded-lg p-4 space-y-3">
    <h2 class="text-sm font-medium text-zinc-400">抓取网页</h2>
    <form id="url-form" class="flex gap-2">
      <input name="url" type="url" placeholder="https://..."
             class="flex-1 bg-zinc-800 border border-zinc-700 rounded px-3 py-1.5 text-sm outline-none focus:border-zinc-500">
      <button class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-sm">抓取</button>
    </form>
    <div id="url-status" class="text-sm text-zinc-500"></div>
  </div>

  <!-- 文档列表 -->
  <div class="space-y-2">
    <h2 class="text-sm font-medium text-zinc-400">已存入文档</h2>
    <ul id="doc-list" class="space-y-1">
      {% for doc in docs %}
      <li class="bg-zinc-900 rounded px-3 py-2 text-sm flex justify-between gap-4 min-w-0">
        <span class="truncate">{{ doc.title }}</span>
        <span class="text-zinc-500 flex-shrink-0">{{ doc.source[:40] if doc.source else '' }}</span>
      </li>
      {% endfor %}
    </ul>
  </div>

</div>

<script>
  // 上传文件
  document.getElementById('upload-form').onsubmit = async (e) => {
    e.preventDefault();
    const status = document.getElementById('upload-status');
    status.textContent = '上传中...';
    const fd = new FormData(e.target);
    const res = await fetch('/memory/upload', {method: 'POST', body: fd});
    const data = await res.json();
    status.textContent = `✓ 已存入：${data.title}`;
    // 刷新文档列表
    addDocToList(data.title, data.title);
  };

  // 抓取网页
  document.getElementById('url-form').onsubmit = async (e) => {
    e.preventDefault();
    const status = document.getElementById('url-status');
    status.textContent = '抓取中...';
    const fd = new FormData(e.target);
    const res = await fetch('/memory/fetch-url', {method: 'POST', body: fd});
    const data = await res.json();
    status.textContent = `✓ 已存入：${data.title}`;
    addDocToList(data.title, data.title);
  };

  function addDocToList(title, source) {
    const li = document.createElement('li');
    li.className = 'bg-zinc-900 rounded px-3 py-2 text-sm flex justify-between';
    li.innerHTML = `<span>${title}</span><span class="text-zinc-500">${source}</span>`;
    document.getElementById('doc-list').prepend(li);
  }
</script>
</div>
{% endblock %}
